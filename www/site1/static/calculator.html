<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHP Calculator</title>
<style>
  body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; }
  .calculator { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 220px; }
  input[type="text"] { width: 100%; height: 40px; font-size: 18px; text-align: right; margin-bottom: 10px; }
  .buttons { display: grid; grid-template-columns: repeat(4, 50px); gap: 5px; }
  button { font-size: 18px; padding: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" readonly>
  <form action="/cgi-bin/calculator.pl" method="post" id="calcForm">
    <input type="hidden" name="expr" id="exprInput">
  </form>
  <div class="buttons">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">/</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">*</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">-</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="submitCalc()">=</button>
    <button onclick="press('+')">+</button>

    <button onclick="clearDisplay()" style="grid-column: span 4; background: #f88;">C</button>
  </div>
</div>

<script>
let display = document.getElementById('display');
let exprInput = document.getElementById('exprInput');

function press(char) {
    display.value += char;
}

function clearDisplay() {
    display.value = '';
}

function submitCalc() {
    // Validate expression: only numbers, + - * / . and parentheses
    if (/^[0-9+\-*/.() ]+$/.test(display.value)) {
        exprInput.value = display.value;
        document.getElementById('calcForm').submit();
    } else {
        alert("Invalid input");
    }
}
</script>

</body>
</html>
