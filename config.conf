# Main webserv configuration for testing
# Valid syntax exercising most directives

server {
    listen 127.0.0.1:8080;
    server_name localhost;
    root /var/www/site1;
    index index.html;
    autoindex off;
    client_max_body_size 8M;
    client_header_timeout 5s;
    client_body_timeout 30s;
    send_timeout 15s;
    client_header_buffer_size 4K;
    client_body_buffer_size 16K;

    error_pages {
        400 /errors/400.html;
        403 /errors/403.html;
        404 /errors/404.html;
        500 /errors/500.html;
    }

    location / {
        root /var/www/site1/public;
        index home.html;
        autoindex off;
        limit_except GET POST;
    }

    location /upload {
        root /var/www/site1/uploads;
        upload_path /var/www/site1/uploads;
        limit_except POST;
    }

    location /cgi-bin {
        root /var/www/site1/cgi;
        cgi_pass /usr/bin/python3;
        limit_except GET;
    }

    location /redirect {
        return 301 https://example.com;
    }
}

server {
    listen 0.0.0.0:80;
    server_name example.com;
    root /var/www/site2;
    index index.htm;
    autoindex on;
    client_max_body_size 2M;
    client_header_timeout 10s;
    client_body_timeout 45s;
    send_timeout 20s;
    client_header_buffer_size 8K;
    client_body_buffer_size 32K;

    error_pages {
        404 /errors/notfound.html;
        502 /errors/badgateway.html;
    }

    location / {
        root /var/www/site2/public;
        autoindex on;
        limit_except GET;
    }

    location /media {
        root /var/www/site2/media;
        autoindex on;
        limit_except GET;
    }

    location /delete-me {
        limit_except DELETE;
    }
}
