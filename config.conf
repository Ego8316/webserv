# Minimal demo config served from ./www/site1

server {
    listen 0.0.0.0:8080;
    server_name webserv.local;
    root ./www/site1;
    index index.html;
    autoindex off;

    client_max_body_size 2M;
    timeout 1s;
    client_header_buffer_size 4K;
    client_body_buffer_size 16K;

    error_pages {
        400 /errors/400.html;
        403 /errors/403.html;
        404 /errors/404.html;
        500 /errors/500.html;
    }

    location / {
        root ./www/site1;
        index index.html;
        autoindex off;
        limit_except GET;
    }

    location /static {
        root ./www/site1/static;
        autoindex on;
        limit_except GET;
    }

    location /upload {
        root ./www/site1/uploads;
        upload_path ./www/site1/uploads;
        limit_except POST;
    }
}

# Cookie/session test site on a separate port
server {
    listen 127.0.0.1:8081;
    server_name cookies.local;
    root ./www/site2;
    index index.html;
    autoindex on;

    client_max_body_size 2M;
    timeout 200s;
    client_header_buffer_size 4K;
    client_body_buffer_size 16K;

    location / {
        root ./www/site2;
        index index.html;
        autoindex on;
        limit_except GET;
    }

    location /static {
        root ./www/site2/static;
        autoindex on;
        limit_except GET;
    }
}
