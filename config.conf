# Minimal demo config served from ./www/site1

server {
    listen 127.0.0.1:8080;
    server_name webserv.local;
    root ./www/site1;
    index index.html;
    autoindex off;

    client_max_body_size 2M;
    client_header_timeout 5s;
    client_body_timeout 30s;
    send_timeout 15s;
    client_header_buffer_size 4K;
    client_body_buffer_size 16K;

    error_pages {
        400 /errors/400.html;
        403 /errors/403.html;
        404 /errors/404.html;
        500 /errors/500.html;
    }

    location / {
        root ./www/site1;
        index index.html;
        autoindex off;
        limit_except GET;
    }

    location /static {
        root ./www/site1/static;
        autoindex on;
        limit_except GET;
    }

    location /upload {
        root ./www/site1/uploads;
        upload_path ./www/site1/uploads;
        limit_except POST;
    }
}
